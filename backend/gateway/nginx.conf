worker_processes auto;

events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=30s;  # Docker embedded DNS

    upstream auth_service       { server auth:5001; }
    upstream agents_service     { server agents:5002; }
    upstream workflows_service  { server workflows:5003; }
    upstream notifications_svc  { server notifications:5004; }

    server {
        listen 80;

        # Health check
        location /health {
            return 200 '{"status":"ok","service":"gateway"}';
            add_header Content-Type application/json;
        }

        # Auth microservice
        location /api/auth/ {
            proxy_pass         http://auth_service/auth/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Agents microservice
        location /api/agents/ {
            proxy_pass         http://agents_service/agents/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Workflows microservice
        location /api/workflows/ {
            proxy_pass         http://workflows_service/workflows/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Notifications microservice
        location /api/notifications/ {
            proxy_pass         http://notifications_svc/notifications/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
