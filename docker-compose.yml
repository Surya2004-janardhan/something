version: "3.9"

services:
  # ─── Infrastructure ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agents}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agents}
      POSTGRES_DB: ${POSTGRES_DB:-agents}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  # ─── API Gateway ──────────────────────────────────────────────
  gateway:
    build: ./backend/gateway
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - auth
      - agents
      - workflows
      - notifications

  # ─── Backend microservices ────────────────────────────────────
  auth:
    build: ./backend/auth
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-agents}:${POSTGRES_PASSWORD:-agents}@postgres:5432/${POSTGRES_DB:-agents}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend/shared:/app/shared:ro
    depends_on:
      - postgres
      - redis

  agents:
    build: ./backend/agents
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-agents}:${POSTGRES_PASSWORD:-agents}@postgres:5432/${POSTGRES_DB:-agents}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend/shared:/app/shared:ro
    depends_on:
      - postgres
      - redis

  workflows:
    build: ./backend/workflows
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-agents}:${POSTGRES_PASSWORD:-agents}@postgres:5432/${POSTGRES_DB:-agents}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend/shared:/app/shared:ro
    depends_on:
      - postgres
      - redis

  notifications:
    build: ./backend/notifications
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-agents}:${POSTGRES_PASSWORD:-agents}@postgres:5432/${POSTGRES_DB:-agents}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend/shared:/app/shared:ro
    depends_on:
      - postgres
      - redis

  # ─── Frontend ─────────────────────────────────────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped
    env_file: .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api
    ports:
      - "3000:3000"
    depends_on:
      - gateway

volumes:
  postgres_data:
