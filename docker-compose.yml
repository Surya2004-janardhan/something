version: "3.9"

# Database: Neon PostgreSQL (external, serverless) — no local postgres container needed.
# Set DATABASE_URL and DIRECT_URL in your .env file pointing to your Neon project.

services:
  # ─── Redis (cache + rate-limit store) ─────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  # ─── Node.js Main Backend ─────────────────────────────────────
  node-api:
    build: ./backend/node-api
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=4000
      - REDIS_URL=redis://redis:6379/0
      - PYTHON_AI_URL=http://python-ai:5000
    ports:
      - "4000:4000"
    depends_on:
      - redis
      - python-ai

  # ─── Python AI Service (internal only) ────────────────────────
  python-ai:
    build: ./backend/python-ai
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}
    depends_on:
      - redis

  # ─── Next.js Frontend ─────────────────────────────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped
    env_file: .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api
    ports:
      - "3000:3000"
    depends_on:
      - node-api
